services:
  training:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    # Keep this container interactive for manual script execution.
    # Phase 4 training will later run on Google Colab GPU using the same repository layout.
    command: ["bash"]
    stdin_open: true
    tty: true

  api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    init: true
    restart: "no"
    env_file:
      - .env
    environment:
      BASE_MODEL_ID: /models/base_model
      INFERENCE_MODE: mock
    ports:
      - "8000:8000"
    volumes:
      - type: bind
        source: ${HOST_BASE_MODEL_PATH:?Set HOST_BASE_MODEL_PATH in .env}
        target: /models/base_model
        read_only: true
      - type: bind
        source: ${HOST_ADAPTER_PATH:?Set HOST_ADAPTER_PATH in .env}
        target: /app/models/fine_tuned_adapter
        read_only: true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5m
